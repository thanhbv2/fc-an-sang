<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kết Quả Trận Đấu | FC ĂN SÁNG</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
*{box-sizing:border-box}
body{font-family:"Hanken Grotesk",sans-serif;background:#f7f9fb;color:#191c1e;margin:0}
.font-anton{font-family:"Anton",sans-serif}
.card{background:#fff;border:1px solid #e0e3e5;border-radius:.5rem;padding:12px;margin-bottom:12px}
.badge-win{background:#e8f5e9;color:#2e7d32;font-weight:700;font-size:11px;padding:3px 8px;border-radius:4px}
.badge-lose{background:#fef2f2;color:#dc2626;font-weight:700;font-size:11px;padding:3px 8px;border-radius:4px}
.badge-draw{background:#fff8e1;color:#92400e;font-weight:700;font-size:11px;padding:3px 8px;border-radius:4px}
.pill-blue{background:#eff6ff;color:#1d4ed8;font-size:11px;padding:2px 8px;border-radius:9999px;display:inline-block;margin:2px}
.pill-green{background:#f0fdf4;color:#15803d;font-size:11px;padding:2px 8px;border-radius:9999px;display:inline-block;margin:2px}
/* Mobile nav */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddc1ae;z-index:99;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.mob-nav a{flex:1;display:flex;flex-direction:column;align-items:center;font-size:10px;font-weight:600;color:#564334;text-decoration:none;gap:2px}
.mob-nav a.active{color:#ff8c00}
.mob-nav span.material-symbols-outlined{font-size:20px}
@media(max-width:767px){
  .mob-nav{display:flex}
  body{padding-bottom:64px}
  .desk-nav{display:none!important}
}
</style>
</head>
<body>

<!-- HEADER -->
<header style="position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #ddc1ae;box-shadow:0 1px 3px rgba(0,0,0,.06)">
  <div style="max-width:1152px;margin:0 auto;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px">
    <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0">
      <img src="images/logo.jpg" alt="" style="width:36px;height:36px;border-radius:50%;object-fit:cover"/>
      <span class="font-anton" style="font-size:18px;color:#ff8c00;font-style:italic">FC ĂN SÁNG</span>
    </a>
    <!-- Desktop nav -->
    <nav class="desk-nav" style="display:flex;gap:20px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#564334">
      <a href="index.html" style="color:#564334;text-decoration:none" onmouseover="this.style.color='#ff8c00'" onmouseout="this.style.color='#564334'">BXH</a>
      <a href="player.html" style="color:#564334;text-decoration:none" onmouseover="this.style.color='#ff8c00'" onmouseout="this.style.color='#564334'">Cầu thủ</a>
      <a href="matches.html" style="color:#ff8c00;text-decoration:none;border-bottom:2px solid #ff8c00;padding-bottom:2px">Kết quả</a>
      <a href="https://www.youtube.com/@fcansang" target="_blank" style="color:#dc2626;text-decoration:none;display:flex;align-items:center;gap:3px">
        <span class="material-symbols-outlined" style="font-size:15px">smart_display</span>YouTube
      </a>
      <a href="https://www.facebook.com/share/g/1LPt3kkL61/?mibextid=wwXIfr" target="_blank" style="color:#1d4ed8;text-decoration:none;display:flex;align-items:center;gap:3px">
        <span class="material-symbols-outlined" style="font-size:15px">group</span>Facebook
      </a>
    </nav>
  </div>
</header>

<!-- HERO -->
<div style="background:#191c1e;padding:20px 16px 16px">
  <div style="max-width:1152px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span class="material-symbols-outlined" style="color:#ff8c00;font-size:22px">emoji_events</span>
      <h1 class="font-anton" style="font-size:clamp(22px,5vw,36px);color:#fff;text-transform:uppercase;margin:0">
        Kết Quả <span style="color:#ff8c00">Trận Đấu</span>
      </h1>
    </div>
    <p id="match-summary" style="color:#9ca3af;font-size:13px;margin:0"></p>
  </div>
</div>

<!-- CONTENT -->
<div style="max-width:1152px;margin:0 auto;padding:16px" id="matches-container"></div>

<!-- FOOTER -->
<footer style="background:#191c1e;border-top:1px solid #2d3133;color:#9ca3af;padding:24px 16px;text-align:center">
  <div style="max-width:1152px;margin:0 auto">
    <div class="font-anton" style="color:#ff8c00;font-size:18px;font-style:italic;margin-bottom:4px">FC ĂN SÁNG</div>
    <div style="font-size:11px;color:#6b7280">© 2026 Ăn Sáng Premier League</div>
    <div style="display:flex;gap:16px;justify-content:center;margin-top:12px;flex-wrap:wrap;font-size:12px">
      <a href="index.html" style="color:#9ca3af;text-decoration:none">BXH</a>
      <a href="player.html" style="color:#9ca3af;text-decoration:none">Cầu thủ</a>
      <a href="matches.html" style="color:#ff8c00;text-decoration:none">Kết quả</a>
      <a href="https://www.youtube.com/@fcansang" target="_blank" style="color:#f87171;text-decoration:none">YouTube</a>
      <a href="https://www.facebook.com/share/g/1LPt3kkL61/?mibextid=wwXIfr" target="_blank" style="color:#60a5fa;text-decoration:none">Facebook</a>
    </div>
  </div>
</footer>

<!-- MOBILE BOTTOM NAV -->
<nav class="mob-nav">
  <a href="index.html"><span class="material-symbols-outlined">leaderboard</span>BXH</a>
  <a href="player.html"><span class="material-symbols-outlined">group</span>Cầu thủ</a>
  <a href="matches.html" class="active"><span class="material-symbols-outlined">sports_soccer</span>Kết quả</a>
  <a href="https://www.youtube.com/@fcansang" target="_blank"><span class="material-symbols-outlined">smart_display</span>YouTube</a>
  <a href="https://www.facebook.com/share/g/1LPt3kkL61/?mibextid=wwXIfr" target="_blank"><span class="material-symbols-outlined">thumb_up</span>Facebook</a>
</nav>

<script src="data/matches.js"></script>
<script>
function fmtDate(d){var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}

function winnerBadge(r){
  if(r==='DRAW') return '<span class="badge-draw">⚖️ HOÀ</span>';
  if(r==='D1_WIN') return '<span class="badge-win">🏆 ĐỘI 1 THẮNG</span>';
  return '<span class="badge-win">🏆 ĐỘI 2 THẮNG</span>';
}
function teamBadge(r,side){
  if(r==='DRAW') return '<span class="badge-draw">HOÀ</span>';
  var win=(r==='D1_WIN'&&side===1)||(r==='D2_WIN'&&side===2);
  return win?'<span class="badge-win">THẮNG 🏆</span>':'<span class="badge-lose">THUA</span>';
}

var byDate={};
MATCHES.forEach(function(m){if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);});
var dates=Object.keys(byDate).sort(function(a,b){return b.localeCompare(a);});

document.getElementById('match-summary').textContent=MATCHES.length+' trận đấu · '+dates.length+' ngày';

var html='';
dates.forEach(function(date){
  var ms=byDate[date];
  // Date header
  html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:8px">'
    +'<span class="material-symbols-outlined" style="color:#ff8c00;font-size:18px">calendar_today</span>'
    +'<span class="font-anton" style="font-size:18px;color:#191c1e">'+fmtDate(date)+'</span>'
    +'<span style="font-size:11px;color:#564334;background:#f2f4f6;padding:2px 8px;border-radius:4px">'+ms.length+' trận</span>'
    +'</div>';

  ms.forEach(function(m,mi){
    var t1=m.team1, t2=m.team2;
    html+='<div class="card">';

    // Card header
    html+='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid #f2f4f6">'
      +'<span style="font-size:12px;font-weight:600;color:#564334;text-transform:uppercase">Trận '+(mi+1)+'</span>'
      +winnerBadge(m.result)
      +(m.note?'<span style="font-size:11px;color:#564334;font-style:italic">📝 '+m.note+'</span>':'')
      +'</div>';

    // Score row - stacked on mobile
    html+='<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:12px">';

    // Team 1
    html+='<div style="text-align:center;padding:8px;background:#f8faff;border-radius:8px">'
      +'<div style="font-size:11px;font-weight:700;color:#1d4ed8;text-transform:uppercase;margin-bottom:4px">⚽ ĐỘI 1</div>'
      +teamBadge(m.result,1)
      +'<div class="font-anton" style="font-size:28px;color:#191c1e;line-height:1.2;margin-top:2px">'+t1.players.length+'</div>'
      +'<div style="font-size:10px;color:#6b7280">người</div>'
      +'</div>';

    // VS
    html+='<div style="text-align:center">'
      +'<div class="font-anton" style="font-size:20px;color:#ff8c00">VS</div>'
      +'<div style="font-size:18px">'+(m.result==='DRAW'?'🤝':'⚔️')+'</div>'
      +'</div>';

    // Team 2
    html+='<div style="text-align:center;padding:8px;background:#f0fdf4;border-radius:8px">'
      +'<div style="font-size:11px;font-weight:700;color:#15803d;text-transform:uppercase;margin-bottom:4px">⚽ ĐỘI 2</div>'
      +teamBadge(m.result,2)
      +'<div class="font-anton" style="font-size:28px;color:#191c1e;line-height:1.2;margin-top:2px">'+t2.players.length+'</div>'
      +'<div style="font-size:10px;color:#6b7280">người</div>'
      +'</div>';

    html+='</div>'; // score grid

    // Players - stacked columns
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';

    // T1 players
    html+='<div>'
      +'<div style="font-size:11px;font-weight:700;color:#1d4ed8;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:4px">'
      +'<span style="width:8px;height:8px;border-radius:50%;background:#3b82f6;display:inline-block"></span>Đội 1 ('+t1.players.length+')</div>'
      +'<div style="display:flex;flex-wrap:wrap">';
    t1.players.forEach(function(p){html+='<span class="pill-blue">'+p+'</span>';});
    html+='</div></div>';

    // T2 players
    html+='<div>'
      +'<div style="font-size:11px;font-weight:700;color:#15803d;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:4px">'
      +'<span style="width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block"></span>Đội 2 ('+t2.players.length+')</div>'
      +'<div style="display:flex;flex-wrap:wrap">';
    t2.players.forEach(function(p){html+='<span class="pill-green">'+p+'</span>';});
    html+='</div></div>';

    html+='</div>'; // players grid
    html+='</div>'; // card
  });
});

document.getElementById('matches-container').innerHTML=html;
</script>
</body>
</html>
